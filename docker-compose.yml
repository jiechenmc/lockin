services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - .git/
            - node_modules/
            - "**/*.log"
    ports:
      - "1323:1323"
    pull_policy: build
    environment:
      DB_URI: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: